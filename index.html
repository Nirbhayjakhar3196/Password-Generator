<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div>
        <h1>Password Generator</h1>
        <input type="text" id="password" placeholder="Enter your password">
        <br><br>
        <input type="number" id="length" placeholder="Enter password length">

        <br><br>
        <label >
            <input type="checkbox" id="uppercase"> Contains Uppercase Letter</input><br>
        </label>
        <label >
            <input type="checkbox" id="symbol"> Contains Symbol</input><br>
        </label>
        <label >
            <input type="checkbox" id="lowercase"> Contains Lowercase Letter</input><br>
        </label>
        <label >
            <input type="checkbox" id="numbers"> Contains Numbers</input><br>
        </label>
        
        <br><br>
        
        <button id="addbtn">Generate</button><br><br>
        <button id="copybtn">Copy</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
