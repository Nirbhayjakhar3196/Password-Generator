<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    
    <div id="container">
        <h1>Password Generator</h1>
        
            <div class="passwordBox">
            <input type="text" id="password">

            <button id="reloadBtn">🔄</button>
            <button id="copybtn">Copy</button>
        </div>

            <p>Password Strength: <span id="strength">Weak</span></p>

        
        <br><br>

        <p>Password Length: <span id="lengthValue">16</span></p>
        <div class="rangeBox">
            <button id="minusbtn">-</button>
            <input type="range" id="length" min="1" max="32" value="16">
            <button id="plusbtn">+</button>
        </div>

        <br><br>
        <label >
            <input type="checkbox" id="uppercase"> Contains Uppercase Letter</input><br>
        </label>
       
        <label >
            <input type="checkbox" id="lowercase"> Contains Lowercase Letter</input><br>
        </label>
         
        <label >
            <input type="checkbox" id="numbers"> Contains Numbers</input><br>
        </label>
        <label >
            <input type="checkbox" id="symbol"> Contains Symbol</input><br>
        </label>
        
        <br><br>
        
        
        

    </div>

    <script src="script.js"></script>

</body>
</html>
